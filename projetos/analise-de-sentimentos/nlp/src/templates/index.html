<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentimento do Tweet</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f0f0; margin: 0; padding: 20px; }
        h1 { color: #333; }
        form { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #4CAF50; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Previsão de Sentimento do Tweet</h1>
    <form action="/predict" method="post">
        <label for="tweet">Digite o tweet:</label>
        <textarea id="tweet" name="tweet" required></textarea>
        <button type="submit">Prever Sentimento</button>
    </form>
    {% if prediction %}
        <div class="result">
            <h2>Resultado:</h2>
            <p><strong>Tweet:</strong> {{ tweet }}</p>
            <p><strong>Sentimento Previsto:</strong> {{ prediction }}</p>
        </div>
    {% endif %}
</body>
</html>
